<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Crispybool Investment</title>
  <link rel="stylesheet" href="css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="js/forgot-password.js"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">Crispybool Investment</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="signup.html" class="signup">Sign Up</a></li>
        <li><a href="login.html" class="login">Login</a></li>
      </ul>
    </nav>
  </header>

  <div class="login-main">
     <div class="login-container">
    <h2>Reset Password</h2>
    <p id="message" class="message"></p>

    <form id="forgotPasswordForm">
      <div class="form-group">
        <label for="email">Enter your email address</label>
        <input type="email" id="email" placeholder="Enter your registered email" required>
      </div>
      <button type="submit">Send Reset Link</button>
    </form>

    <div class="register">
      <p>Remember your password?</p>
      <button type="button" onclick="window.location.href='login.html'">Login</button>
    </div>
  </div>
  </div>
</body>
</html>
