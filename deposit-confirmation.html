<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deposit Confirmation - Crispybool Investment</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/deposit-confirmation.css" />
  <link rel="stylesheet" href="css/dashboard-nav.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="js/deposit-confirmation.js" defer></script>
</head>
<body>
  <header>
    <div id="navbar-container"></div>
    <script type="module" src="js/dashboard-nav.js"></script>
  </header>

  <main class="confirmation-main">
    <div class="confirmation-card">
      <!-- Header -->
      <div class="confirmation-header">
        <div class="header-icon">
          <i class="fas fa-file-invoice-dollar"></i>
        </div>
        <h1>Deposit Initiated</h1>
        <p>Review your deposit details below</p>
        <div id="status-badge" class="status-badge pending">
          <i class="fas fa-circle-notch fa-spin"></i> Confirming...
        </div>
      </div>

      <!-- Loading Spinner -->
      <div id="confirmation-spinner" class="spinner-container">
        <div class="loader"></div>
        <p id="confirmation-message">Confirming your transaction...</p>
      </div>

      <!-- Details Wrapper -->
      <div id="deposit-details-wrapper" class="details-wrapper" style="display: none;">
        <div id="deposit-details" class="details-list">
          <!-- JS will populate rows here -->
        </div>

        <!-- Footer Actions -->
        <div class="footer-actions">
          <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
          <a href="deposit.html" class="btn btn-secondary">Make Another Deposit</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
