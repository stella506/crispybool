<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crispybool Investment Certificate</title>
  <style>
    /* ======certificate body design===== */
 .certificate-body {
      margin: 0;
      padding: 20px;
      background: #f4f6f9;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;

<body class="certificate-body">
