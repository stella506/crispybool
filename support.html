<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Crispybool Investment</title>
  <link rel="stylesheet" href="css/support.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/index.css" />  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="js/index.js" defer></script>

  <!-- google translate script -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<body>
  <div id="google_translate_element" style="text-align: right; margin: 10px;"></div>
<header>
 
    <div id="navbar-container"></div>

<script  type="module" src="js/navbar-auth.js"></script>
  </header>

  <!-- ================= MAIN CONTENT ================= -->
  <main>
    <section class="support-section">
      <div class="container">
        <h1>Contact Support</h1>
        <p>We are here to help you with any questions or concerns you may have about Crispybool Investment. Please fill out the form below and we will get back to you as soon as possible.</p>

        <form id="supportForm" class="support-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            <span class="error-message" id="nameError"></span>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            <span class="error-message" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Describe your question or issue..." required></textarea>
            <span class="error-message" id="messageError"></span>
          </div>

          <button type="submit" class="submit-btn">Send Message</button>
        </form>

      </div>
    </section>
  </main>

  <!-- ================= FOOTER ================= -->
 <footer>

    <div id="footer-container"></div>
    
<script type="module" src="js/footer.js"></script>

  </footer>

  <script src="js/support.js"></script>
</body>
</html>
