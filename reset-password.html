<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - Crispybool Investment</title>
  <link rel="stylesheet" href="css/login.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="js/reset-password.js"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">Crispybool Investment</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <div class="login-main">
     <div class="login-container">
    <h2>Set New Password</h2>
    <p id="message" class="message"></p>

    <form id="resetPasswordForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter new password" required>
          <span id="togglePassword" class="toggle-btn">Show</span>
        </div>
      </div>
      <button type="submit">Update Password</button>
    </form>
  </div>
  </div>
</body>
</html>
